services:
  dendrite-scraper:
    build: .
    ports:
      - "8020:8020"
    environment:
      # Bind all interfaces *inside the container* so the published port works;
      # the published port is still controlled by the `ports:` mapping below.
      - DENDRITE_HOST=0.0.0.0
      - DENDRITE_PORT=8020
      - DENDRITE_CLEANUP_PROVIDER=${DENDRITE_CLEANUP_PROVIDER:-none}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8020/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
