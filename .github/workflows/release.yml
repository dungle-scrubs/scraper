name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071  # v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: pypi / publish
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    # Protected environment: configure required reviewers / tag restrictions in
    # the GitHub repo settings for defense-in-depth on PyPI publishing.
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      # Pinned by commit SHA (DF-5). Bump via Dependabot; tags shown for reference.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff  # v6

      - name: Test before publishing
        run: uv run pytest tests/ -q

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - run: pip install build

      - run: python -m build

      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
