name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref, branch, or tag to publish
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ inputs.ref || github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: pypi / publish
    runs-on: ubuntu-latest
    # Protected environment: configure required reviewers / tag restrictions in
    # the GitHub repo settings for defense-in-depth on PyPI publishing.
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      # Pinned by commit SHA (DF-5). Bump via Dependabot; tags shown for reference.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff  # v6

      - name: Test before publishing
        run: uv run pytest tests/ -q

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - run: pip install build

      - run: python -m build

      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
