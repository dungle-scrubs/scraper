name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref, branch, or tag to publish
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ inputs.ref || github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: pypi / publish
    runs-on: ubuntu-latest
    # Protected environment: configure required reviewers / tag restrictions in
    # the GitHub repo settings for defense-in-depth on PyPI publishing.
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      # Pin third-party actions by commit SHA in production (Dependabot updates them).
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: astral-sh/setup-uv@v6

      - name: Test before publishing
        run: uv run pytest tests/ -q

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install build

      - run: python -m build

      - uses: pypa/gh-action-pypi-publish@release/v1
