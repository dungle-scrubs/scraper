name: Feature Request
description: Suggest a feature
labels: [enhancement]
body:
  - type: textarea
    id: description
    attributes:
      label: What do you want?
      placeholder: Describe the feature
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Why?
      placeholder: What problem does this solve?
    validations:
      required: true
